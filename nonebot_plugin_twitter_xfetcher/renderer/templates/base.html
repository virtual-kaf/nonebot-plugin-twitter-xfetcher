<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "Meiryo", sans-serif;
  color: #e7e9ea;
  -webkit-font-smoothing: antialiased;
}

/* === 单条推文卡片 === */
.tweet-card {
  width: 600px;
  background: #000;
  border: 1px solid #2f3336;
  border-radius: 16px;
  padding: 16px;
  margin: 12px auto;
}
.tweet-header {
  display: flex;
  align-items: flex-start;
  margin-bottom: 4px;
}
.tweet-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: #2f3336;
  flex-shrink: 0;
  margin-right: 12px;
  overflow: hidden;
}
.tweet-avatar img {
  width: 100%; height: 100%; object-fit: cover;
}
.tweet-user {
  flex: 1;
  min-width: 0;
}
.tweet-name {
  font-size: 15px; font-weight: 700;
  color: #e7e9ea;
  line-height: 20px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tweet-name .verified {
  color: #1d9bf0; margin-left: 2px;
}
.tweet-handle {
  font-size: 15px; color: #71767b;
  line-height: 20px;
}
.tweet-handle .time {
  color: #71767b;
}
.tweet-handle .time::before { content: "\00b7"; margin: 0 4px; }

.tweet-body {
  padding-left: 60px;
}
.tweet-text {
  font-size: 15px; line-height: 1.5;
  color: #e7e9ea;
  margin-bottom: 8px;
  white-space: pre-wrap; word-wrap: break-word;
}
.tweet-translation {
  font-size: 15px; line-height: 1.5;
  color: #71767b;
  margin-bottom: 8px;
  padding-top: 8px;
  border-top: 1px solid #2f3336;
  white-space: pre-wrap; word-wrap: break-word;
}
.tweet-translation::before {
  content: "中文翻译";
  display: block;
  font-size: 12px; color: #1d9bf0;
  margin-bottom: 4px;
}

/* 媒体 */
.tweet-media {
  margin: 12px 0 4px;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #2f3336;
}
.tweet-media img, .tweet-media video {
  width: 100%; display: block;
}
.tweet-media-grid {
  display: grid; gap: 2px;
}
.tweet-media-grid.cols-1 { grid-template-columns: 1fr; }
.tweet-media-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.tweet-media-grid.cols-3 { grid-template-columns: 1fr 1fr; }
.tweet-media-grid.cols-3 img:first-child { grid-column: 1 / -1; }
.tweet-media-grid.cols-4 { grid-template-columns: 1fr 1fr; }
.tweet-media-grid img {
  width: 100%; height: 100%; object-fit: cover;
  aspect-ratio: 16/9;
}

/* 互动数据 */
.tweet-stats {
  display: flex; gap: 16px;
  padding: 12px 0 4px;
  border-top: 1px solid #2f3336;
  margin-top: 12px;
  font-size: 14px; color: #71767b;
}
.tweet-stats span { white-space: nowrap; }
.tweet-stats strong { color: #e7e9ea; font-weight: 600; }

/* 时间和链接 */
.tweet-footer {
  font-size: 14px; color: #71767b;
  padding-top: 8px;
}
.tweet-footer a {
  color: #1d9bf0; text-decoration: none;
}

/* === 线程连线 === */
.thread-connector {
  display: flex; justify-content: center; align-items: center;
  height: 24px; margin: 0 auto;
}
.thread-line {
  width: 2px; height: 100%;
  background: #2f3336;
}
.thread-arrow {
  text-align: center; font-size: 14px; color: #71767b;
  padding: 4px 0;
}
.reply-badge {
  display: inline-block;
  font-size: 13px; color: #1d9bf0;
  margin-bottom: 8px;
}

/* === 引用推文 === */
.quote-card {
  border: 1px solid #2f3336;
  border-radius: 16px;
  padding: 12px;
  margin-top: 12px;
}
.quote-header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px;
}
.quote-avatar {
  width: 20px; height: 20px; border-radius: 50%;
  background: #2f3336; overflow: hidden;
}
.quote-avatar img { width: 100%; height: 100%; object-fit: cover; }
.quote-name {
  font-size: 13px; font-weight: 700; color: #e7e9ea;
}
.quote-handle {
  font-size: 13px; color: #71767b;
}
.quote-text {
  font-size: 13px; line-height: 1.4; color: #e7e9ea;
  white-space: pre-wrap; word-wrap: break-word;
}
.quote-media {
  margin-top: 8px; border-radius: 12px; overflow: hidden;
}
.quote-media img { width: 100%; display: block; }

/* === 直播通知 === */
.live-alert {
  width: 600px;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 1px solid #e0245e;
  border-radius: 16px;
  padding: 20px;
  margin: 12px auto;
  text-align: center;
}
.live-icon {
  font-size: 48px; margin-bottom: 8px;
}
.live-title {
  font-size: 20px; font-weight: 700; color: #fff;
  margin-bottom: 8px;
}
.live-members {
  font-size: 15px; color: #1d9bf0;
  margin-bottom: 8px;
}
.live-time {
  font-size: 16px; color: #e0245e; font-weight: 600;
  margin-bottom: 4px;
}
.live-note {
  font-size: 13px; color: #71767b;
}

/* 多卡片容器 */
.card-container {
  display: flex; flex-direction: column;
  align-items: center; padding: 16px 0;
}
.card-label {
  font-size: 13px; color: #71767b;
  padding: 4px 60px; width: 600px;
}
</style>
</head>
<body>
<div class="card-container">
{% block content %}{% endblock %}
</div>
</body>
</html>
